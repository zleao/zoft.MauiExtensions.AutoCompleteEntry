name: Publish package

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main
      publish_to_nuget:
        description: Push packages to NuGet.org
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  DOTNET_VERSION: 9.0.300
  BUILD_CONFIGURATION: Release
  PROJECT_FILE: src\AutoCompleteEntry\AutoCompleteEntry.csproj
  PACKAGE_OUTPUT: src\AutoCompleteEntry\bin\Release
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  publish-package:
    name: Build and publish package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore $env:PROJECT_FILE

      - name: Build package
        shell: pwsh
        run: dotnet build $env:PROJECT_FILE -c $env:BUILD_CONFIGURATION --nologo

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            src/AutoCompleteEntry/bin/Release/*.nupkg
            src/AutoCompleteEntry/bin/Release/*.snupkg
          if-no-files-found: error

      - name: Push package to NuGet.org
        if: github.event_name == 'push' || fromJSON(github.event.inputs.publish_to_nuget || 'false')
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
              throw "Repository secret 'NUGET_API_KEY' is required to publish packages."
          }

          Push-Location $env:PACKAGE_OUTPUT

          try {
              Get-ChildItem . -Filter *.nupkg |
                Where-Object { $_.Name -notlike '*.snupkg' } |
                ForEach-Object {
                  dotnet nuget push $_.Name `
                    --source $env:NUGET_SOURCE `
                    --api-key $env:NUGET_API_KEY `
                    --skip-duplicate
                }
          }
          finally {
              Pop-Location
          }

      - name: Create or update GitHub release and attach packages
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'

          $releaseExists = gh release view $tag --json tagName 2>$null
          if (-not $releaseExists) {
              gh release create $tag --title "Release $tag" --generate-notes
          }

          Push-Location $env:PACKAGE_OUTPUT

          try {
              Get-ChildItem . -Include *.nupkg,*.snupkg -File |
                ForEach-Object {
                  gh release upload $tag $_.Name --clobber
                }
          }
          finally {
              Pop-Location
          }
