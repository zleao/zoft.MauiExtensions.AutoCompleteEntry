name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.xaml'
      - 'src/**/*.csproj'
      - 'src/**/*.props'
      - 'src/**/*.targets'
      - 'src/**/*.sln'
      - 'sample/**/*.cs'
      - 'sample/**/*.xaml'
      - 'sample/**/*.csproj'
      - '.github/workflows/**'
      - 'global.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUILD_CONFIGURATION: Release
  PROJECT_FILE: src\AutoCompleteEntry\AutoCompleteEntry.csproj
  TEST_PROJECT_FILE: src\Tests\AutoCompleteEntry.Tests\AutoCompleteEntry.Tests.csproj
  SAMPLE_PROJECT_FILE: sample\AutoCompleteEntry.Sample\AutoCompleteEntry.Sample.csproj

jobs:
  build-library:
    name: Build library
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore $env:PROJECT_FILE

      - name: Build library
        shell: pwsh
        run: dotnet build $env:PROJECT_FILE -c $env:BUILD_CONFIGURATION --nologo

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            src/AutoCompleteEntry/bin/Release/*.nupkg
            src/AutoCompleteEntry/bin/Release/*.snupkg
          if-no-files-found: error

  unit-tests:
    name: Unit tests
    runs-on: windows-latest
    needs: build-library
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore $env:PROJECT_FILE

      - name: Restore test project
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT_FILE

      - name: Run unit tests
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT_FILE
          --no-restore
          --configuration $env:BUILD_CONFIGURATION
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests (.NET 10)
          path: TestResults/results.trx
          reporter: dotnet-trx

  build-sample:
    name: Build sample app (Windows)
    runs-on: windows-latest
    needs: build-library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore $env:SAMPLE_PROJECT_FILE

      - name: Build sample app
        shell: pwsh
        run: dotnet build $env:SAMPLE_PROJECT_FILE -f net10.0-windows10.0.19041.0 -c $env:BUILD_CONFIGURATION --nologo
